# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y


## NEW

# ── Wireless / Power ─────────────────────────────────────
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# 15 min → deep sleep
CONFIG_ZMK_IDLE_TIMEOUT=60000
# 1 min  → idle (OLED off)

# ── Bluetooth ────────────────────────────────────────────
CONFIG_BT_MAX_CONN=2
# Only 2 profiles: Mac + Windows
CONFIG_BT_MAX_PAIRED=2
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Improves macOS stability

# ── OLED ─────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_INVERT=n
# White text on black
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# Shows BT profile name

# ── RGB ──────────────────────────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40
# 40% brightness on boot
# (saves battery)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=240
# Blue default hue

# ── Typing feel ──────────────────────────────────────────
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Auto-shift: disabled (as requested)
CONFIG_ZMK_KEY_REPEAT=y
# Keep key-repeat though (useful for nav)

# ── No gaming / media features needed ────────────────────
# Mouse keys, gaming profiles, etc. are not included
# to keep firmware lean and battery life longer
